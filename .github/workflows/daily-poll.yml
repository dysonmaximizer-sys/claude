name: Daily Competitive Poll

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: competitive_intel/requirements.txt

      - name: Install dependencies
        run: pip install -r competitive_intel/requirements.txt

      - name: Run daily poll
        working-directory: competitive_intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          CHANGEDETECTION_API_KEY: ${{ secrets.CHANGEDETECTION_API_KEY }}
          CHANGEDETECTION_BASE_URL: ${{ secrets.CHANGEDETECTION_BASE_URL }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_CHANGES_DB_ID: ${{ secrets.NOTION_CHANGES_DB_ID }}
          TEAMS_GENERAL_WEBHOOK: ${{ secrets.TEAMS_GENERAL_WEBHOOK }}
          TEAMS_WEBHOOK_EQUISOFT: ${{ secrets.TEAMS_WEBHOOK_EQUISOFT }}
          TEAMS_WEBHOOK_CLOVEN: ${{ secrets.TEAMS_WEBHOOK_CLOVEN }}
          TEAMS_WEBHOOK_HUBSPOT: ${{ secrets.TEAMS_WEBHOOK_HUBSPOT }}
          TEAMS_WEBHOOK_LAYLAH: ${{ secrets.TEAMS_WEBHOOK_LAYLAH }}
          TEAMS_WEBHOOK_SALESFORCE: ${{ secrets.TEAMS_WEBHOOK_SALESFORCE }}
          TEAMS_WEBHOOK_WEALTHBOX: ${{ secrets.TEAMS_WEBHOOK_WEALTHBOX }}
          TEAMS_WEBHOOK_MONDAY: ${{ secrets.TEAMS_WEBHOOK_MONDAY }}
          TEAMS_WEBHOOK_ZOHO: ${{ secrets.TEAMS_WEBHOOK_ZOHO }}
          TEAMS_WEBHOOK_ONEVEST: ${{ secrets.TEAMS_WEBHOOK_ONEVEST }}
          TEAMS_WEBHOOK_PIPEDRIVE: ${{ secrets.TEAMS_WEBHOOK_PIPEDRIVE }}
          TEAMS_WEBHOOK_ADVORA: ${{ secrets.TEAMS_WEBHOOK_ADVORA }}
        run: python -m jobs.daily_poll
