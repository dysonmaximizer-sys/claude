name: Monthly Strategic Synthesis

on:
  schedule:
    # 1st of every month at 08:00 UTC — scoring runs first
    - cron: "0 8 1 * *"
  workflow_dispatch:
    inputs:
      target_year:
        description: "Override year (e.g. 2025) — leave blank for previous month"
        required: false
      target_month:
        description: "Override month 1–12 — leave blank for previous month"
        required: false

jobs:
  score-and-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Score changes + send alerts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: competitive_intel/requirements.txt

      - name: Install dependencies
        run: pip install -r competitive_intel/requirements.txt

      - name: Score all unscored changes
        working-directory: competitive_intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          VISUALPING_API_KEY: ${{ secrets.VISUALPING_API_KEY }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_COMPETITORS_DB_ID: ${{ secrets.NOTION_COMPETITORS_DB_ID }}
          NOTION_CHANGES_DB_ID: ${{ secrets.NOTION_CHANGES_DB_ID }}
          TEAMS_GENERAL_WEBHOOK: ${{ secrets.TEAMS_GENERAL_WEBHOOK }}
          TEAMS_WEBHOOK_EQUISOFT: ${{ secrets.TEAMS_WEBHOOK_EQUISOFT }}
          TEAMS_WEBHOOK_CLOVEN: ${{ secrets.TEAMS_WEBHOOK_CLOVEN }}
          TEAMS_WEBHOOK_HUBSPOT: ${{ secrets.TEAMS_WEBHOOK_HUBSPOT }}
          TEAMS_WEBHOOK_LAYLAH: ${{ secrets.TEAMS_WEBHOOK_LAYLAH }}
          TEAMS_WEBHOOK_SALESFORCE: ${{ secrets.TEAMS_WEBHOOK_SALESFORCE }}
          TEAMS_WEBHOOK_WEALTHBOX: ${{ secrets.TEAMS_WEBHOOK_WEALTHBOX }}
          TEAMS_WEBHOOK_MONDAY: ${{ secrets.TEAMS_WEBHOOK_MONDAY }}
          TEAMS_WEBHOOK_ZOHO: ${{ secrets.TEAMS_WEBHOOK_ZOHO }}
          TEAMS_WEBHOOK_ONEVEST: ${{ secrets.TEAMS_WEBHOOK_ONEVEST }}
          TEAMS_WEBHOOK_PIPEDRIVE: ${{ secrets.TEAMS_WEBHOOK_PIPEDRIVE }}
          TEAMS_WEBHOOK_ADVORA: ${{ secrets.TEAMS_WEBHOOK_ADVORA }}
        run: python -m jobs.monthly_score

  generate-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Generate + distribute newsletter
    needs: score-and-alert  # waits for scoring to finish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: competitive_intel/requirements.txt

      - name: Install dependencies
        run: pip install -r competitive_intel/requirements.txt

      - name: Generate and send newsletter
        working-directory: competitive_intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_COMPETITORS_DB_ID: ${{ secrets.NOTION_COMPETITORS_DB_ID }}
          NOTION_CHANGES_DB_ID: ${{ secrets.NOTION_CHANGES_DB_ID }}
          TEAMS_GENERAL_WEBHOOK: ${{ secrets.TEAMS_GENERAL_WEBHOOK }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.target_year }}" ]; then
            ARGS="${{ github.event.inputs.target_year }} ${{ github.event.inputs.target_month }}"
          fi
          python -m jobs.monthly_newsletter $ARGS
