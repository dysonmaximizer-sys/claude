name: Newsletter Draft (Monthly)

on:
  schedule:
    # 1st of every month at 09:00 UTC
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      target_year:
        description: "Override year (e.g. 2026) — leave blank for previous month"
        required: false
      target_month:
        description: "Override month 1–12 — leave blank for previous month"
        required: false

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Generate + send draft newsletter

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: competitive_intel/requirements.txt

      - name: Install dependencies
        run: pip install -r competitive_intel/requirements.txt

      - name: Generate and send draft newsletter
        working-directory: competitive_intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          CHANGEDETECTION_API_KEY: ${{ secrets.CHANGEDETECTION_API_KEY }}
          CHANGEDETECTION_BASE_URL: ${{ secrets.CHANGEDETECTION_BASE_URL }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_CHANGES_DB_ID: ${{ secrets.NOTION_CHANGES_DB_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          DRAFT_REVIEWER: ${{ secrets.DRAFT_REVIEWER }}
        run: |
          ARGS="--mode draft"
          if [ -n "${{ github.event.inputs.target_year }}" ]; then
            ARGS="$ARGS --year ${{ github.event.inputs.target_year }} --month ${{ github.event.inputs.target_month }}"
          fi
          python -m jobs.monthly_newsletter $ARGS
