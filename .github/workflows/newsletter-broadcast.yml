name: Newsletter Broadcast (Manual)

on:
  workflow_dispatch:
    inputs:
      target_year:
        description: "Year (e.g. 2026)"
        required: true
      target_month:
        description: "Month 1-12"
        required: true
      confirm:
        description: 'Type SEND to confirm broadcast (case-sensitive)'
        required: true

jobs:
  broadcast-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Broadcast newsletter to CI Newsletter audience

    steps:
      - name: Confirmation gate
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "SEND" ]; then
            echo "::error::Confirmation text must be exactly SEND. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: competitive_intel/requirements.txt
      - name: Install dependencies
        run: pip install -r competitive_intel/requirements.txt
      - name: Broadcast newsletter
        working-directory: competitive_intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          CHANGEDETECTION_API_KEY: ${{ secrets.CHANGEDETECTION_API_KEY }}
          CHANGEDETECTION_BASE_URL: ${{ secrets.CHANGEDETECTION_BASE_URL }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_CHANGES_DB_ID: ${{ secrets.NOTION_CHANGES_DB_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: |
          python -m jobs.monthly_newsletter --mode broadcast --year ${{ github.event.inputs.target_year }} --month ${{ github.event.inputs.target_month }}
