name: Newsletter (Monthly Broadcast)

on:
  schedule:
    # 1st of every month at 17:00 UTC = 09:00 PST.
    # NOTE: GitHub cron does not observe DST, so during Pacific Daylight Time
    # (~Mar–Nov) this fires at 10:00 Pacific. Use "0 16 1 * *" if you want
    # 09:00 during PDT instead.
    - cron: "0 17 1 * *"
  workflow_dispatch:
    inputs:
      target_year:
        description: "Year (e.g. 2026) — leave blank for previous month"
        required: false
      target_month:
        description: "Month 1-12 — leave blank for previous month"
        required: false
      confirm:
        description: 'Type SEND to confirm a MANUAL broadcast (scheduled runs skip this)'
        required: false

jobs:
  broadcast-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Broadcast newsletter to CI Newsletter audience

    steps:
      # Scheduled runs auto-send. Manual runs must type SEND to guard against
      # accidental re-broadcasts.
      - name: Confirmation gate (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "SEND" ]; then
            echo "::error::Manual broadcast requires confirm=SEND. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: competitive_intel/requirements.txt
      - name: Install dependencies
        run: pip install -r competitive_intel/requirements.txt
      - name: Broadcast newsletter
        working-directory: competitive_intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          CHANGEDETECTION_API_KEY: ${{ secrets.CHANGEDETECTION_API_KEY }}
          CHANGEDETECTION_BASE_URL: ${{ secrets.CHANGEDETECTION_BASE_URL }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_CHANGES_DB_ID: ${{ secrets.NOTION_CHANGES_DB_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: |
          # No --year/--month → the job defaults to the previous calendar month.
          ARGS="--mode broadcast"
          if [ -n "${{ github.event.inputs.target_year }}" ]; then
            ARGS="$ARGS --year ${{ github.event.inputs.target_year }} --month ${{ github.event.inputs.target_month }}"
          fi
          python -m jobs.monthly_newsletter $ARGS
